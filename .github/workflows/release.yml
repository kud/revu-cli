name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-latest
            pkg_dir: npm-packages/darwin-arm64

          - target: darwin-x64
            runner: macos-13
            pkg_dir: npm-packages/darwin-x64

          - target: linux-x64
            runner: ubuntu-latest
            pkg_dir: npm-packages/linux-x64

          - target: linux-arm64
            runner: ubuntu-24.04-arm
            pkg_dir: npm-packages/linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun build --compile --minify index.ts --outfile ${{ matrix.pkg_dir }}/revu-bin

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: revu-bin-${{ matrix.target }}
          path: ${{ matrix.pkg_dir }}/revu-bin
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: revu-bin-*
          merge-multiple: false

      - name: Move binaries into place
        run: |
          chmod +x revu-bin-darwin-arm64/revu-bin
          chmod +x revu-bin-darwin-x64/revu-bin
          chmod +x revu-bin-linux-x64/revu-bin
          chmod +x revu-bin-linux-arm64/revu-bin
          mv revu-bin-darwin-arm64/revu-bin npm-packages/darwin-arm64/revu-bin
          mv revu-bin-darwin-x64/revu-bin   npm-packages/darwin-x64/revu-bin
          mv revu-bin-linux-x64/revu-bin    npm-packages/linux-x64/revu-bin
          mv revu-bin-linux-arm64/revu-bin  npm-packages/linux-arm64/revu-bin

      - name: Publish platform packages
        run: |
          cd npm-packages/darwin-arm64 && npm publish --access public && cd ../..
          cd npm-packages/darwin-x64   && npm publish --access public && cd ../..
          cd npm-packages/linux-x64    && npm publish --access public && cd ../..
          cd npm-packages/linux-arm64  && npm publish --access public && cd ../..

      - name: Publish revu-cli
        run: npm publish --access public
