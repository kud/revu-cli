[tools]
bun = "1.3.11"

[tasks.dev]
run = "bun --hot {{config_root}}/index.ts"
description = "Run revu in hot-reload mode for development"

[tasks.start]
run = "bun {{config_root}}/index.ts"
description = "Run revu — optionally pass a repo path: mise run start -- /path/to/repo"

[tasks.demo]
run = "zsh {{config_root}}/scripts/demo.sh"
description = "Launch revu with fake staged diffs for testing"

[tasks."demo:record"]
run = "zsh {{config_root}}/scripts/demo.sh --record"
description = "Record a demo session to assets/demo.cast"

[tasks."demo:record:upload"]
run = "zsh {{config_root}}/scripts/demo.sh --record --upload"
description = "Record a demo session and upload to asciinema.org"

[tasks."demo:upload"]
run = "zsh {{config_root}}/scripts/demo.sh --upload"
description = "Upload assets/demo.cast to asciinema.org"

[tasks.build]
run = "bun build index.ts --compile --minify --outfile revu-bin"
description = "Compile revu to a standalone binary"

[tasks."bump:patch"]
run = "bun scripts/bump.ts patch"
description = "Bump patch version, commit, tag, and push — triggers CI release"

[tasks."bump:minor"]
run = "bun scripts/bump.ts minor"
description = "Bump minor version, commit, tag, and push — triggers CI release"

[tasks."bump:major"]
run = "bun scripts/bump.ts major"
description = "Bump major version, commit, tag, and push — triggers CI release"
